services:
  # Backend API
  - type: web
    name: ai-assistant-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        value: super-secret-key-123456789

  # Frontend Web
  - type: web
    name: ai-assistant-web
    env: static
    buildCommand: cd frontend-web && npm install && npm run build
    staticPublishPath: ./frontend-web/dist
    plan: free
