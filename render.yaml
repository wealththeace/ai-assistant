services:
  # Backend API
  - type: web
    name: ai-assistant-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        value: super-secret-key-change-this
      - key: DATABASE_URL
        fromDatabase:
          name: ai-assistant-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-assistant-redis
          property: connectionString

  # Frontend Web App
  - type: web
    name: ai-assistant-web
    env: static
    buildCommand: cd frontend-web && npm install && npm run build
    staticPublishPath: ./frontend-web/dist
    plan: free

  # PostgreSQL Database (Free)
  - type: pserv
    name: ai-assistant-db
    plan: free

  # Redis (Free)
  - type: redis
    name: ai-assistant-redis
    plan: free
